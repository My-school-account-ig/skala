<html>
  <head>
    <title> skala computer </title>
    <style>
      body {
        background-color: black;
      }
    </style>
    <style>
      $finalHeight: 250px;
      $finalWidth: 3* $finalHeight;
      &scrollBarHeight: 1px;

      ::-webkit-scrollbar {
        width: $scrollBarheight;
        height: $scrollBarHeight;
      }

      ::-webkit-scrollbar-button {
        width: $scrollBarHeight;
        height: $scrollBarHeight;
      }

      .horizontal-scroll-wrapper {
        position: absolute;
        dipay: block;
        top: 0;
        left: 0;
        width: 1000px;
        max-height: $finalWidth;
        margin: 0;
        padding-top: $scrollBarHeight;
        background: #000;
        overflow-y: auto;
        overflow-x: hidden;
        transform: rotate(-90deg) translateY(-$finalHeight);
        transform-origin: right top;
      }
    </style>
  </head>
  <body>
    <div class="horizontal-scroll-wrapper">
      <div style="border: 1px outset white; background-color: black; margin-left: 10px;">
        <div style="margin-left: 1px; background: #F00; text-align: center; text-color: black;">
          <text> test </text>
        </div>
      </div>
    </div>
  </body>
</html>
